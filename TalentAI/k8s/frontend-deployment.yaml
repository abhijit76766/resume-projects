apiVersion: apps/v1
kind: Deployment
metadata:
  name: talentai-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: talentai-frontend
  template:
    metadata:
      labels:
        app: talentai-frontend
    spec:
      containers:
        - name: frontend
          image: talentai-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: talentai-frontend
spec:
  type: LoadBalancer
  selector:
    app: talentai-frontend
  ports:
    - port: 80
      targetPort: 80
